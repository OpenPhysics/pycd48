# Continuous Monitoring Experiment
#
# Long-term continuous data collection for monitoring
# count rates over time.
#
# Use this for:
#   - Background radiation monitoring
#   - Long-term stability measurements
#   - Environmental monitoring
#   - Time-series analysis

name: continuous_monitoring
description: Continuous count rate monitoring

# Device connection settings
connection:
  baudrate: 115200
  timeout: 1.0

# Device configuration
settings:
  trigger_level: 0.5  # volts
  impedance: 50ohm

  channels:
    "0":  # Channel A singles
      A: 1
      B: 0
      C: 0
      D: 0
    "1":  # Channel B singles
      A: 0
      B: 1
      C: 0
      D: 0
    "4":  # A-B coincidences
      A: 1
      B: 1
      C: 0
      D: 0

# Experiment parameters
experiment:
  type: continuous
  duration: 3600  # 1 hour total
  interval: 10    # 10 seconds per measurement
  channels: [0, 1, 4]  # Monitor channels 0, 1, and 4

# Output settings
output:
  directory: ./data
  csv: true   # Save CSV for easy plotting
  json: true  # Save JSON for detailed analysis
