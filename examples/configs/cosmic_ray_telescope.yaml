# Cosmic Ray Telescope Experiment
#
# This configuration sets up a cosmic ray muon detector with a vertical
# telescope arrangement of scintillation detectors.
#
# Setup:
#   - Detector A: Top detector
#   - Detector B: Bottom detector
#   - Detector C: Middle detector (optional)
#   - Channel 4: A-B coincidence (vertical muons)
#   - Channel 5: A-B-C triple coincidence (higher selectivity)

name: cosmic_ray_telescope
description: Cosmic ray muon telescope with vertical detector arrangement

# Device connection settings
connection:
  # port: /dev/ttyUSB0  # Uncomment to specify port, otherwise auto-detect
  baudrate: 115200
  timeout: 1.0
  init_delay: 2.0

# Device configuration
settings:
  # Trigger level optimized for scintillation detectors with PMT/SiPM
  trigger_level: 0.3  # volts

  # Use 50 Ohm impedance for good signal integrity
  impedance: 50ohm

  # Channel configuration
  channels:
    "0":  # Detector A singles (top)
      A: 1
      B: 0
      C: 0
      D: 0
    "1":  # Detector B singles (bottom)
      A: 0
      B: 1
      C: 0
      D: 0
    "2":  # Detector C singles (middle)
      A: 0
      B: 0
      C: 1
      D: 0
    "3":  # Detector D singles (background/reference)
      A: 0
      B: 0
      C: 0
      D: 1
    "4":  # A-B 2-fold coincidence (vertical muons)
      A: 1
      B: 1
      C: 0
      D: 0
    "5":  # A-B-C 3-fold coincidence (higher selectivity)
      A: 1
      B: 1
      C: 1
      D: 0
    "6":  # A-C coincidence
      A: 1
      B: 0
      C: 1
      D: 0
    "7":  # B-C coincidence
      A: 0
      B: 1
      C: 1
      D: 0

# Experiment parameters
experiment:
  type: continuous
  duration: 300  # 5 minutes total
  interval: 5    # 5 seconds per measurement
  channels: [0, 1, 2, 3, 4, 5, 6, 7]  # All channels

# Output settings
output:
  directory: ./data
  csv: true
  json: true
